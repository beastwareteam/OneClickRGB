name: 🐛 Bug Report
description: Report something broken
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief description of the bug
      placeholder: "What's the bug?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Launch OneClickRGB
        2. Connect device
        3. Set color to red
        4. Observe crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: "Device should light up red"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Application crashed"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - Ubuntu 20.04
        - Ubuntu 22.04
        - macOS 12
        - macOS 13
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OneClickRGB Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: device
    attributes:
      label: Device Information
      placeholder: |
        Device: ASUS Aura LED
        VID: 0x0b05
        PID: 0x19af
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Any relevant output or crash logs?
      render: "log"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help?
