name: 🔨 Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows MSVC
            cmake-args: -A x64
            
          - os: ubuntu-20.04
            name: Linux GCC
            cmake-args: ""
            
          - os: macos-latest
            name: macOS Clang
            cmake-args: ""

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: 3.20.x
    
    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libhidapi-dev ninja-build
    
    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install hidapi ninja
    
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1.12
    
    - name: Create Build Directory
      run: cmake -E make_directory build
    
    - name: Configure CMake
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake-args }}
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel 4
    
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: oneclickrgb-${{ runner.os }}-${{ github.run_number }}
        path: build/bin/
        retention-days: 5

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds successful!"
            exit 0
          else
            echo "❌ Build failed!"
            exit 1
          fi
